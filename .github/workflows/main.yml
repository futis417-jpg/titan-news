name: Titan Omnipresencia 25.0

on:
  schedule:
    - cron: '*/15 * * * *' # Cada 15 minutos (Nivel máximo estable de GitHub)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Imperial Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python news_bot.py

      - name: Commit & Push History
        run: |
          git config --global user.name 'Titan-Omni'
          git config --global user.email 'omni@titan.com'
          git add titan_history.json
          git commit -m "Update news history cache" || exit 0
          git push
